name: Daily Meme

on:
  schedule:
    - cron: '50 7 * * *'
  workflow_dispatch:

jobs:
  send-meme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Send Meme
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: node meme-sender.js
